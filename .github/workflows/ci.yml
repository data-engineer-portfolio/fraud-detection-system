# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyyaml pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --cov=fraud_detection \
            --cov-report=term-missing \
            --ignore=tests/integration

      - name: Confirm imports work
        run: |
          python -c "
          from fraud_detection.config import ProjectConfig
          print('✓ config imports')
          "
